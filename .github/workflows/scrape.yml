name: Scrape Moody's Events

on:
  schedule:
    - cron: "0 7 * * 1,4"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape:
    name: Playwright Scrape → Commit events.json
    runs-on: ubuntu-latest
    timeout-minutes: 30  # increased — scraper now visits each event detail page

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libpango-1.0-0 libpangocairo-1.0-0 libgtk-3-0 \
            libx11-xcb1 libxcb-dri3-0

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Verify scraper file exists
        run: |
          if [ ! -f moodys-scraper.js ]; then
            echo "❌ moodys-scraper.js not found in repo root!"
            ls -la
            exit 1
          fi
          echo "✓ moodys-scraper.js found"

      - name: Run scraper
        run: node moodys-scraper.js

      - name: Verify events.json was created
        run: |
          if [ ! -f events.json ]; then
            echo "❌ events.json not created!"
            exit 1
          fi
          echo "✓ events.json created:"
          wc -c events.json
          head -c 400 events.json

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update events.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
